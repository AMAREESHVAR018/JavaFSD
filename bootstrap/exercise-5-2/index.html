<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5.2 - Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row g-4 align-items-center">
            <div class="col-md-6 order-md-2">
                <img class="img-fluid rounded-3" src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=900&q=80" alt="Community event volunteers">
            </div>
            <div class="col-md-6 order-md-1">
                <h1 class="h2 fw-bold">Volunteer Program</h1>
                <p class="text-muted">The image moves first on mobile and second on medium screens using order-md-1 and order-md-2.</p>
                <button class="btn btn-success">Join Now</button>
            </div>
        </div>
    </div>
</body>
</html>
