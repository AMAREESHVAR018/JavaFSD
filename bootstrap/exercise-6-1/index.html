<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6.1 - Flex Navbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-white border-bottom">
        <div class="container py-3 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <span class="fw-bold fs-4">Community Portal</span>
            </div>
            <nav class="d-flex flex-column flex-md-row gap-2">
                <a class="btn btn-link text-decoration-none" href="#">Events</a>
                <a class="btn btn-link text-decoration-none" href="#">Categories</a>
                <a class="btn btn-link text-decoration-none" href="#">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container py-5">
        <p class="lead">This navigation stacks on mobile and becomes horizontal on medium screens.</p>
    </main>
</body>
</html>
