<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16.2 - Overlay Badge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="position-relative d-inline-block">
            <img class="img-fluid rounded-3" src="https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=900&q=80" alt="Community event hall">
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger">Live</span>
        </div>
    </div>
</body>
</html>
