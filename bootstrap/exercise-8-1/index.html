<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.1 - Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4">Event Registration</h1>
                        <form>
                            <div class="mb-3">
                                <label class="form-label" for="fullName">Full Name</label>
                                <input class="form-control" id="fullName" type="text" placeholder="Enter your name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="emailAddress">Email</label>
                                <input class="form-control" id="emailAddress" type="email" placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="eventType">Selected Event</label>
                                <div class="input-group">
                                    <span class="input-group-text">Event</span>
                                    <input class="form-control" id="eventType" type="text" placeholder="Music Festival">
                                </div>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" id="updates" type="checkbox">
                                <label class="form-check-label" for="updates">Send community updates</label>
                            </div>
                            <button class="btn btn-primary" type="submit">Register</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
