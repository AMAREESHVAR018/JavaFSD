<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.1 - Sidebar Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row g-4">
      <aside class="col-md-3">
        <div class="p-4 bg-white border rounded shadow-sm">
          <h1 class="h4">Sidebar</h1>
          <ul class="list-unstyled mb-0">
            <li>Events</li>
            <li>Categories</li>
            <li>Community News</li>
          </ul>
        </div>
      </aside>
      <main class="col-md-9">
        <div class="p-4 bg-white border rounded shadow-sm">
          <h2 class="h3">Main Content</h2>
          <p class="mb-0">Browse local community events, registration updates, and service programs in one place.</p>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
