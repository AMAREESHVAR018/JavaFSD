<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2 - Pricing Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-6 fw-bold">Membership Plans</h1>
            <p class="text-muted">Choose a plan for the community portal.</p>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100 text-center shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h4">Basic</h2>
                        <p class="display-6 fw-bold">Free</p>
                        <p>Event browsing and community updates.</p>
                        <button class="btn btn-outline-primary">Select</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 text-center shadow border-primary border-2">
                    <div class="card-body p-4">
                        <h2 class="h4">Plus</h2>
                        <p class="display-6 fw-bold">$9</p>
                        <p>Registration alerts and category filters.</p>
                        <button class="btn btn-primary">Select</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 text-center shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h4">Pro</h2>
                        <p class="display-6 fw-bold">$19</p>
                        <p>Priority access and event reminders.</p>
                        <button class="btn btn-outline-secondary">Select</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
