<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.1 - Responsive Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4">Community Events Grid</h1>
    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4"><div class="p-4 bg-white border rounded shadow-sm h-100"><h2 class="h5">Food Festival</h2><p class="mb-0">Saturday street food and local vendors.</p></div></div>
      <div class="col-12 col-md-6 col-lg-4"><div class="p-4 bg-white border rounded shadow-sm h-100"><h2 class="h5">Sports Meet</h2><p class="mb-0">Community games and friendly matches.</p></div></div>
      <div class="col-12 col-md-6 col-lg-4"><div class="p-4 bg-white border rounded shadow-sm h-100"><h2 class="h5">Volunteer Drive</h2><p class="mb-0">Join the neighborhood clean-up team.</p></div></div>
    </div>
  </div>
</body>
</html>
