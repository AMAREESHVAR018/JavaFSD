<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11.1 - Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <img class="card-img-top" src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=900&q=80" alt="Community organizer">
                    <div class="card-body">
                        <h1 class="card-title h4">Asha Patel</h1>
                        <p class="card-text text-muted">Community organizer helping with events, registration, and volunteer programs.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
