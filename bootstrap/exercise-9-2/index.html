<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2 - Button Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">Button Groups</h1>
        <div class="btn-group mb-4" role="group" aria-label="Event filters">
            <button class="btn btn-outline-primary">All</button>
            <button class="btn btn-outline-primary">Music</button>
            <button class="btn btn-outline-primary">Food</button>
        </div>
        <div class="btn-group" role="group" aria-label="Toggle filters">
            <input type="checkbox" class="btn-check" id="volunteer" autocomplete="off">
            <label class="btn btn-outline-success" for="volunteer">Volunteer</label>
            <input type="checkbox" class="btn-check" id="workshop" autocomplete="off">
            <label class="btn btn-outline-success" for="workshop">Workshop</label>
        </div>
    </div>
</body>
</html>
