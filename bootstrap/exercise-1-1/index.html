<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 1.1 - Bootstrap CDN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <span class="badge text-bg-primary mb-3">Local Community Event Portal</span>
            <h1 class="display-6 fw-bold">Bootstrap 5 via CDN</h1>
            <p class="lead text-muted">This basic page links Bootstrap 5.3 from the CDN and shows a simple community events welcome panel.</p>
            <button class="btn btn-success">View Events</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
