<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17.2 - Icon Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="d-flex gap-2">
            <button class="btn btn-primary" aria-label="Add Event"><i class="bi bi-plus-lg"></i></button>
            <button class="btn btn-success" aria-label="Save Event"><i class="bi bi-check-lg"></i></button>
            <button class="btn btn-danger" aria-label="Delete Event"><i class="bi bi-trash"></i></button>
        </div>
    </div>
</body>
</html>
