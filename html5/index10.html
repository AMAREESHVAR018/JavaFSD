<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Portal</title>
    <style>

        #container {

            width: 900px;
            padding: 300px;
            border: 2px solid black;
            background-color: lightyellow;
            text-align: center;
        }

        button {

            padding: 10px;
            margin-top: 10px;
        }

    </style>

</head>

<body>

    <div id="container">

        <h2>Community Event Registration</h2>

        <p id="countDisplay">
            Registered Users: 0
        </p>

        <button onclick="registerUser()">
            Register
        </button>

    </div>

    <script>

        let count = 0;

        function registerUser() {

            console.log("Before Increment:", count);

            count++;

            console.log("After Increment:", count);

            document.getElementById("countDisplay")
                .innerHTML =
                "Registered Users: " + count;

        }

    </script>

</body>

</html>
